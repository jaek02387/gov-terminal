<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gov Policy Terminal</title>
  <link rel="stylesheet" href="/static/css/styles.css?v=17" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="topbar" role="banner">
    <h1>GOV&nbsp;POLICY&nbsp;TERMINAL</h1>
    <div class="topbar-controls">
      <div id="refresh-indicator" class="refresh-indicator" aria-live="polite">
        Loading&hellip;
      </div>
      <button id="refresh-btn" type="button">Refresh now</button>
      <div class="textsize" role="group" aria-label="Text size">
        <button id="text-smaller" type="button" aria-label="Decrease text size">A&minus;</button>
        <button id="text-larger" type="button" aria-label="Increase text size">A+</button>
      </div>
    </div>
  </header>

  <main id="main" role="main">
    <!-- 2x2 dashboard of panel quadrants -->
    <div id="dashboard"></div>

    <!-- Full-screen expanded view of a single panel (toggled by "See more") -->
    <section id="expanded" hidden aria-label="Expanded panel view">
      <div class="expanded-bar">
        <button id="expanded-back" type="button">&larr; Back to dashboard</button>
        <h2 id="expanded-title"></h2>
      </div>
      <div id="expanded-body" class="panel-body"></div>
    </section>
  </main>

  <!-- Lazy bill detail overlay (opened on click from any bill row) -->
  <div id="bill-detail" class="detail-overlay" hidden role="dialog" aria-modal="true"
       aria-label="Bill detail">
    <div class="detail-bar">
      <button id="detail-back" type="button">&larr; Back</button>
      <h2 id="detail-title"></h2>
    </div>
    <div id="detail-body" class="detail-body"></div>
  </div>

  <script type="module" src="/static/js/app.js?v=17"></script>
</body>
</html>
